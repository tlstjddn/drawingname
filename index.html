<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 
      안내: 이 코드 전체를 복사하여 'lotto.html' 등의 이름으로 저장한 뒤, 
      웹 브라우저에서 열면 앱을 사용할 수 있습니다.
      단, TailwindCSS / 폭죽효과 / 구글폰트는 인터넷 연결이 필요합니다.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 추첨 머신</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        #machineCanvas {
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2);
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #e2e8f0);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.05); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.3); }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">

    <!-- Header -->
    <header class="py-6 text-center shadow-sm bg-white border-b border-slate-200 z-10 flex flex-col items-center">
        <div class="flex items-center justify-center gap-3 md:gap-5">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="w-10 h-10 md:w-14 md:h-14 drop-shadow-md">
                <path d="M12,52 L36,28 L44,36 Z" fill="#FF3B30" />
                <path d="M10,54 L12,52 L44,36 L42,38 Z" fill="#C93429" />
                <line x1="38" y1="26" x2="44" y2="20" stroke="#FFCC00" stroke-width="3" stroke-linecap="round" />
                <line x1="46" y1="34" x2="52" y2="28" stroke="#FFCC00" stroke-width="3" stroke-linecap="round" />
                <circle cx="48" cy="16" r="3" fill="#4CD964" />
                <circle cx="56" cy="24" r="2.5" fill="#5AC8FA" />
                <circle cx="54" cy="40" r="3.5" fill="#AF52DE" />
                <rect x="34" y="10" width="6" height="6" fill="#FF9500" transform="rotate(45 37 13)" />
                <rect x="58" y="12" width="5" height="5" fill="#FF2D55" transform="rotate(15 60 14)" />
                <path d="M40,24 Q48,12 56,20 T62,10" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>
            </svg>

            <h1 class="text-3xl md:text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500">
                행운의 추첨 머신
            </h1>

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="w-10 h-10 md:w-14 md:h-14 drop-shadow-md scale-x-[-1]">
                <path d="M12,52 L36,28 L44,36 Z" fill="#FF3B30" />
                <path d="M10,54 L12,52 L44,36 L42,38 Z" fill="#C93429" />
                <line x1="38" y1="26" x2="44" y2="20" stroke="#FFCC00" stroke-width="3" stroke-linecap="round" />
                <line x1="46" y1="34" x2="52" y2="28" stroke="#FFCC00" stroke-width="3" stroke-linecap="round" />
                <circle cx="48" cy="16" r="3" fill="#4CD964" />
                <circle cx="56" cy="24" r="2.5" fill="#5AC8FA" />
                <circle cx="54" cy="40" r="3.5" fill="#AF52DE" />
                <rect x="34" y="10" width="6" height="6" fill="#FF9500" transform="rotate(45 37 13)" />
                <rect x="58" y="12" width="5" height="5" fill="#FF2D55" transform="rotate(15 60 14)" />
                <path d="M40,24 Q48,12 56,20 T62,10" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>
        <p class="text-slate-500 mt-2">행운의 당첨자를 멋지게 뽑아보세요!</p>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row w-full max-w-7xl mx-auto p-4 gap-6 items-center justify-center">
        
        <!-- Left Panel: Input Area -->
        <section class="glass-panel w-full md:w-1/3 rounded-2xl p-6 flex flex-col h-[500px]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">명단 입력</h2>
                <span id="countBadge" class="bg-blue-600 text-xs px-2 py-1 rounded-full font-bold text-white">0명</span>
            </div>
            
            <p class="text-sm text-slate-500 mb-2">이름을 줄바꿈(엔터) 또는 쉼표(,)로 구분하여 입력하세요.</p>

            <!-- 추첨 진행시간 설정 -->
            <div class="mb-3">
                <label for="drawDurationInput" class="block text-sm font-bold text-slate-700 mb-1">
                    추첨 진행시간 설정
                </label>
                <div class="flex items-center gap-2">
                    <input 
                        id="drawDurationInput" 
                        type="number" 
                        min="1" 
                        max="15" 
                        step="0.5" 
                        value="3.5"
                        class="w-24 bg-white border border-slate-300 rounded-lg px-3 py-2 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                    <span class="text-sm text-slate-500">초</span>
                    <span class="text-xs text-slate-400">1~15초 사이 입력</span>
                </div>
            </div>
            
            <textarea id="namesInput" class="w-full flex-1 bg-white border border-slate-300 rounded-xl p-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none shadow-inner" placeholder="홍길동&#10;김철수&#10;이영희&#10;..."></textarea>
            
            <button id="drawBtn" class="mt-4 w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-400 hover:to-purple-500 text-white font-bold py-4 px-6 rounded-xl transition-all duration-300 transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-blue-500/30 text-lg">
                추첨 시작하기!
            </button>
        </section>

        <!-- Right Panel: Machine Area -->
        <section class="w-full md:w-2/3 flex flex-col items-center justify-center relative">
            
            <div class="relative w-full max-w-[500px] aspect-square flex items-center justify-center">
                <canvas id="machineCanvas" width="500" height="500" class="w-full h-full object-contain z-0"></canvas>
                
                <div class="absolute inset-0 rounded-full pointer-events-none" style="background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 40%); box-shadow: inset 0 0 40px rgba(0,0,0,0.1);"></div>
            </div>

            <!-- Winner Display Modal/Overlay -->
            <div id="winnerOverlay" class="absolute inset-0 z-20 flex flex-col items-center justify-center hidden bg-white/80 backdrop-blur-md rounded-3xl">
                <div class="text-center animate-pop">
                    <p class="text-2xl text-purple-600 font-bold mb-2">축하합니다! 오늘의 당첨자는...</p>
                    <div class="bg-gradient-to-r from-yellow-300 via-yellow-400 to-yellow-600 text-slate-900 font-black text-6xl md:text-7xl py-6 px-12 rounded-2xl shadow-2xl border-4 border-yellow-200 inline-block">
                        <span id="winnerText">홍길동</span>
                    </div>
                    <div class="mt-8">
                        <button id="resetBtn" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-full transition-colors">
                            다시 추첨하기
                        </button>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-8 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-full font-bold shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50">
        메시지
    </div>

    <script>
        // --- UI Elements ---
        const namesInput = document.getElementById('namesInput');
        const countBadge = document.getElementById('countBadge');
        const drawBtn = document.getElementById('drawBtn');
        const resetBtn = document.getElementById('resetBtn');
        const drawDurationInput = document.getElementById('drawDurationInput');
        const winnerOverlay = document.getElementById('winnerOverlay');
        const winnerText = document.getElementById('winnerText');
        const toast = document.getElementById('toast');
        const canvas = document.getElementById('machineCanvas');
        const ctx = canvas.getContext('2d');

        // --- Canvas & Physics Constants ---
        const width = canvas.width;
        const height = canvas.height;
        const cx = width / 2;
        const cy = height / 2;
        const machineRadius = 240;
        const ballRadius = 24;

        // --- State ---
        let participants = [];
        let balls = [];
        let animationId;
        let isDrawing = false;
        let drawPhase = 'idle';
        let audioCtx;

        // --- Audio Utilities ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playDrumroll(duration) {
            if (!audioCtx) return;
            const totalHits = Math.max(1, Math.floor(duration * 12));
            const hitRate = duration / totalHits;
            
            for (let i = 0; i < totalHits; i++) {
                const startTime = audioCtx.currentTime + (i * hitRate);
                const vol = 0.1 + (i / totalHits) * 0.6;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(100 + (i * 0.5), startTime);
                osc.frequency.exponentialRampToValueAtTime(40, startTime + hitRate);
                
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(vol, startTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + hitRate * 0.8);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(startTime);
                osc.stop(startTime + hitRate);
                
                const bufferSize = audioCtx.sampleRate * hitRate; 
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let j = 0; j < bufferSize; j++) {
                    data[j] = Math.random() * 2 - 1;
                }

                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = audioCtx.createGain();
                const noiseFilter = audioCtx.createBiquadFilter();
                
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                
                noiseGain.gain.setValueAtTime(0, startTime);
                noiseGain.gain.linearRampToValueAtTime(vol * 0.5, startTime + 0.01);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, startTime + hitRate * 0.6);
                
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                
                noise.start(startTime);
            }
        }

        function playSuccessSound() {
            if (!audioCtx) return;
            
            const playBrass = (freq, startTime, duration, vol=0.25) => {
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const osc3 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                
                osc1.type = 'sawtooth';
                osc2.type = 'sawtooth';
                osc3.type = 'square';
                
                osc1.frequency.value = freq;
                osc2.frequency.value = freq * 1.005;
                osc3.frequency.value = freq * 0.995;
                
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(3000, startTime);
                filter.frequency.exponentialRampToValueAtTime(800, startTime + 0.2);
                
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(vol, startTime + 0.05);
                gain.gain.setValueAtTime(vol, startTime + duration - 0.1);
                gain.gain.linearRampToValueAtTime(0, startTime + duration);
                
                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc1.start(startTime);
                osc2.start(startTime);
                osc3.start(startTime);
                osc1.stop(startTime + duration);
                osc2.stop(startTime + duration);
                osc3.stop(startTime + duration);
            };

            const now = audioCtx.currentTime;
            const G4 = 392.00, C5 = 523.25, E5 = 659.25, G5 = 783.99;
            
            const dt = 0.15;
            playBrass(G4, now, dt);
            playBrass(G4, now + dt, dt);
            playBrass(G4, now + dt*2, dt);
            
            playBrass(C5, now + dt*3, 1.5, 0.3);
            playBrass(E5, now + dt*3, 1.5, 0.3);
            playBrass(G5, now + dt*3, 1.5, 0.3);
        }

        // --- Utilities ---
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }

        function getDrawDuration() {
            let duration = parseFloat(drawDurationInput.value);

            if (isNaN(duration)) {
                duration = 3.5;
            }

            if (duration < 1) {
                duration = 1;
            }

            if (duration > 15) {
                duration = 15;
            }

            drawDurationInput.value = duration;
            return duration;
        }

        // 입력 값 업데이트 이벤트
        namesInput.addEventListener('input', () => {
            const rawText = namesInput.value;
            participants = rawText.split(/[\n,]+/).map(n => n.trim()).filter(n => n !== '');
            countBadge.textContent = `${participants.length}명`;
            
            if (!isDrawing) {
                initBalls();
            }
        });

        // --- Ball Class ---
        class Ball {
            constructor(text, index) {
                this.text = text;
                this.x = cx + (Math.random() - 0.5) * 100;
                this.y = cy + (Math.random() - 0.5) * 100;
                
                this.baseSpeed = 3;
                this.vx = (Math.random() - 0.5) * this.baseSpeed * 2;
                this.vy = (Math.random() - 0.5) * this.baseSpeed * 2;
                
                const hue = (index * 137.5) % 360;
                this.color = `hsl(${hue}, 80%, 60%)`;
                this.textColor = '#ffffff';
                
                this.displayChar = text.length > 3 ? text.substring(0, 3) : text;
            }

            update(speedMultiplier = 1) {
                this.x += this.vx * speedMultiplier;
                this.y += this.vy * speedMultiplier;

                const dx = this.x - cx;
                const dy = this.y - cy;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist + ballRadius > machineRadius) {
                    const nx = dx / dist;
                    const ny = dy / dist;
                    
                    this.x = cx + nx * (machineRadius - ballRadius);
                    this.y = cy + ny * (machineRadius - ballRadius);

                    const dot = this.vx * nx + this.vy * ny;
                    this.vx -= 2 * dot * nx;
                    this.vy -= 2 * dot * ny;

                    this.vx += (Math.random() - 0.5);
                    this.vy += (Math.random() - 0.5);

                    const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if(currentSpeed < 1) {
                        this.vx *= 1.5;
                        this.vy *= 1.5;
                    }
                }
            }

            draw(ctx) {
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                ctx.beginPath();
                ctx.arc(this.x, this.y, ballRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                ctx.shadowColor = 'transparent';
                const gradient = ctx.createRadialGradient(
                    this.x - ballRadius*0.3, this.y - ballRadius*0.3, ballRadius*0.1,
                    this.x, this.y, ballRadius
                );
                gradient.addColorStop(0, 'rgba(255,255,255,0.4)');
                gradient.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.lineWidth = 1;
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.stroke();

                ctx.fillStyle = this.textColor;
                ctx.font = this.displayChar.length >= 3 ? 'bold 13px "Noto Sans KR"' : 'bold 16px "Noto Sans KR"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.displayChar, this.x, this.y);
            }
        }

        // --- Animation Loop ---
        function initBalls() {
            balls = [];
            const displayCount = Math.min(participants.length, 50);
            
            for (let i = 0; i < displayCount; i++) {
                balls.push(new Ball(participants[i], i));
            }
            if (!animationId) {
                animate();
            }
        }

        function drawMachineBackground() {
            ctx.clearRect(0, 0, width, height);
            
            ctx.beginPath();
            ctx.arc(cx, cy, machineRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)';
            ctx.lineWidth = 10;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(cx, cy, machineRadius - 5, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function animate() {
            drawMachineBackground();

            let speedMultiplier = 1;
            if (drawPhase === 'mixing') {
                speedMultiplier = 6;
            } else if (drawPhase === 'idle') {
                speedMultiplier = 0.5;
            }

            if (drawPhase !== 'revealing' && drawPhase !== 'done') {
                balls.forEach(ball => {
                    ball.update(speedMultiplier);
                    ball.draw(ctx);
                });
            }

            animationId = requestAnimationFrame(animate);
        }

        // --- Interaction Logic ---
        drawBtn.addEventListener('click', () => {
            if (participants.length < 1) {
                showToast("추첨할 인원이 없습니다. 명단을 추가해주세요!");
                return;
            }
            if (isDrawing) return;

            startDraw();
        });

        resetBtn.addEventListener('click', () => {
            winnerOverlay.classList.add('hidden');
            drawPhase = 'idle';
            isDrawing = false;
            initBalls();
            
            drawBtn.disabled = false;
            drawBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            namesInput.disabled = false;
            drawDurationInput.disabled = false;
        });

        function startDraw() {
            isDrawing = true;
            drawPhase = 'mixing';

            const drawDuration = getDrawDuration();
            
            initAudio();
            playDrumroll(drawDuration);
            
            drawBtn.disabled = true;
            drawBtn.classList.add('opacity-50', 'cursor-not-allowed');
            namesInput.disabled = true;
            drawDurationInput.disabled = true;

            setTimeout(() => {
                revealWinner();
            }, drawDuration * 1000);
        }

        function revealWinner() {
            drawPhase = 'revealing';

            const winnerIndex = Math.floor(Math.random() * participants.length);
            const winnerName = participants[winnerIndex];

            participants.splice(winnerIndex, 1);
            countBadge.textContent = `${participants.length}명`;
            namesInput.value = participants.join('\n');

            winnerText.textContent = winnerName;

            setTimeout(() => {
                winnerOverlay.classList.remove('hidden');
                drawPhase = 'done';
                playSuccessSound();
                fireConfetti();
            }, 500);
        }

        function fireConfetti() {
            var duration = 3000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // 초기 화면 렌더링
        drawMachineBackground();
    </script>
</body>
</html>
